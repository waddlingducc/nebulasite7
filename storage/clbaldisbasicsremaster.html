<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>‎</title>

  <!-- Make Baldi asset paths resolve correctly -->
  <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/baldi-remaster/">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">

  <!-- Google Ads (load ONCE per page) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2366308143645027" crossorigin="anonymous"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black url(/images/colour-dark-grey-mz-vf.jpg) center center / cover no-repeat fixed;
    }

    /* Nav bar */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 7vw;
      display: flex; align-items: center;
      backdrop-filter: blur(10px) saturate(200%) brightness(70%);
      padding: 0 1%;
      z-index: 10;
    }
    nav img {
      width: 95px; height: auto;
      margin-right: 1%;
      border-radius: 1vw;
    }
    nav h3 {
      font-size: 4vw;
      font-weight: 800;
      color: white;
      font-family: 'Montserrat', sans-serif;
    }

    /* Under-nav row */
    .content {
      position: fixed;
      top: 7vw; left: 0; right: 0; bottom: 0;
      display: flex; gap: 20px; align-items: stretch;
      padding: 0 16px 16px 16px;
      box-sizing: border-box;
    }

    /* Game area */
    .game-wrap {
      flex: 1 1 auto;
      display: flex; align-items: stretch; justify-content: center;
      min-width: 0;
      position: relative;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    #game_frame { width: 100%; height: 100%; position: relative; }

    /* Baldi mount */
    #unity-canvas { width: 100%; height: 100%; display: block; }
    #baldi-loading {
      position: absolute; top: 16px; left: 0; right: 0;
      text-align: center; color: white;
      font-size: clamp(18px, 3vw, 32px);
      font-family: cursive;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 2;
    }

    /* Right ad rail */
    .side-ad {
      flex: 0 0 300px;
      display: block;
      text-align: center;
      border-radius: 8px;
      overflow: hidden;
      backdrop-filter: blur(6px) saturate(140%) brightness(85%);
    }
    .side-ad ins.adsbygoogle {
      display: inline-block !important;
      width: 300px !important;
      height: 600px !important;
    }

    @media (max-width: 1100px) {
      .side-ad { display: none; }
      .content { padding-right: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/"><img alt="logo" src="/images/logo.png"/></a>
    <h3>www.NebulaPlay.Site</h3>
  </nav>

  <div class="content">
    <!-- Game -->
    <div class="game-wrap">
      <div id="game_frame">
        <div id="baldi-loading">LOADING...</div>
        <canvas id="unity-canvas" tabindex="-1"></canvas>
      </div>
    </div>

    <!-- Right Vertical Ad -->
    <aside class="side-ad">
      <ins class="adsbygoogle"
           style="display:inline-block;width:300px;height:600px"
           data-ad-client="ca-pub-2366308143645027"
           data-ad-slot="9891545305"></ins>
      <script>(window.adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>
  </div>

  <!-- === Baldi’s Basics ONLY (Unity WebGL) === -->
  <script src="Build/WebGL.loader.js"></script>
  <script>
    // Mobile viewport tweak from your embed
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.head.appendChild(meta);
    }

    const loadingText = document.getElementById("baldi-loading");
    let totalBytes = 0, loadedBytes = 0;

    function formatSize(bytes) {
      if (bytes > 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
      if (bytes > 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      if (bytes > 1024) return (bytes / 1024).toFixed(2) + " KB";
      return bytes + " B";
    }
    async function getSize(url) {
      try {
        const res = await fetch(url, { method: "HEAD" });
        return parseInt(res.headers.get("Content-Length") || "0", 10);
      } catch { return 0; }
    }
    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      let chunks = [], received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);
        const doneText = formatSize(loadedBytes);
        const totalText = formatSize(totalBytes);
        const percent = totalBytes > 0 ? ((loadedBytes / totalBytes) * 100).toFixed(1) : "?";
        if (loadingText) loadingText.textContent = `LOADING... ${doneText} / ${totalText} (${percent}%)`;
      }
      const fullBuffer = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) { fullBuffer.set(chunk, offset); offset += chunk.length; }
      return fullBuffer.buffer;
    }
    async function mergeFiles(parts) {
      const buffers = await Promise.all(parts.map(fetchWithProgress));
      return URL.createObjectURL(new Blob(buffers));
    }
    function getParts(file, count) {
      const parts = [];
      for (let i = 1; i <= count; i++) parts.push(file + ".part" + i);
      return parts;
    }

    (async () => {
      // Baldi split assets (exactly as in your code)
      const dataParts = getParts("Build/WebGL.data", 3);
      const wasmParts = getParts("Build/WebGL.wasm", 3);
      const allParts = [...dataParts, ...wasmParts];

      const sizes = await Promise.all(allParts.map(getSize));
      totalBytes = sizes.reduce((a, b) => a + b, 0);

      const [dataUrl, wasmUrl] = await Promise.all([
        mergeFiles(dataParts),
        mergeFiles(wasmParts)
      ]);

      createUnityInstance(document.getElementById("unity-canvas"), {
        dataUrl: dataUrl,
        frameworkUrl: "Build/WebGL.framework.js",
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Basically Games",
        productName: "Baldi's Basics Classic Remastered",
        productVersion: "1.1",
      }).then(() => { if (loadingText) loadingText.remove(); });
    })();
  </script>

  <!-- IMPORTANT: No Eaglercraft/Minecraft scripts anywhere on this page -->
</body>
</html>
