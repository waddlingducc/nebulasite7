<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16934078239"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-16934078239');
  </script>

  <!-- AdSense -->
  <script async crossorigin="anonymous"
          src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2366308143645027"></script>

  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>‎</title>

  <link href="/main.css" rel="stylesheet"/>
  <link href="https://site-assets.fontawesome.com/releases/v6.2.0/css/all.css" rel="stylesheet"/>
</head>
<body style="margin:0;padding:0;width:100%;overflow-x:hidden;overflow-y:auto;font-family:'Montserrat',system-ui,Arial,sans-serif;background:black url(/images/background.png) center/cover no-repeat fixed;">

  <!-- Nav -->
  <nav style="position:fixed;top:0;left:0;width:100%;height:7vw;display:flex;align-items:center;justify-content:left;padding:0 1%;color:#fff;backdrop-filter:blur(10px) saturate(200%) brightness(70%);z-index:5;">
    <a href="/"><img alt="logo" src="/images/logo.png" style="width:95px;height:auto;margin-right:1%;border-radius:1vw;user-select:none;cursor:pointer;box-shadow:5px 5px 10px rgba(53,53,53,.46);"/></a>
    <h3 style="font-size:4vw;font-weight:800;margin:0;">www.NebulaPlay.Site</h3>
  </nav>

  <!-- Spacer to clear fixed nav -->
  <div style="height:300px;width:100%;"></div>

  <!-- Stage (3 columns) -->
  <main style="display:grid;grid-template-columns:160px 900px 160px;justify-content:center;align-items:start;column-gap:8px;width:100%;position:relative;">

    <!-- LEFT rail -->
    <aside style="margin-top:20px;z-index:100;position:sticky;top:calc(7vw + 20px);">
      <ins class="adsbygoogle"
           style="display:inline-block;width:160px;height:600px"
           data-ad-client="ca-pub-2366308143645027"
           data-ad-slot="9891545305"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>

    <!-- GAME COLUMN -->
    <section style="display:flex;flex-direction:column;align-items:center;gap:12px;z-index:1;">
      <div style="color:#fff;font-weight:800;font-size:clamp(28px,3.2vw,48px);line-height:1.1;text-align:center;background:rgba(0,0,0,.6);padding:10px 20px;border-radius:12px;display:inline-block;">
        Unblocker
      </div>

      <!-- Wrapper with background image behind iframe -->
      <div
        style="position:relative;width:900px;height:540px;background:url(/images/ubackground.png) center/cover no-repeat;border-radius:8px;overflow:hidden;">
        <!-- Actions -->
        <div style="position:absolute;top:8px;right:8px;z-index:200;display:flex;">
          <a href="/-/=/" style="text-decoration:none;color:#fff;background:#000;padding:8px 16px;border-radius:8px;display:inline-block;">
            <h3 style="margin:0;font-size:22px;line-height:1;">Fullscreen</h3>
          </a>
        </div>

        <!-- Iframe -->
        <iframe
          sandbox="allow-scripts allow-same-origin"
          src="https://ub.erezerwacja24.pl/"
          allowtransparency="true"
          style="width:100%;height:100%;border:none;background:transparent;">
          <p>Your browser does not support iframes.</p>
        </iframe>
      </div>
    </section>

    <!-- RIGHT rail -->
    <aside style="margin-top:20px;z-index:100;position:sticky;top:calc(7vw + 20px);">
      <ins class="adsbygoogle"
           style="display:inline-block;width:160px;height:600px"
           data-ad-client="ca-pub-2366308143645027"
           data-ad-slot="9891545305"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>
  </main>

  <!-- Bottom ad -->
  <div style="display:flex;justify-content:center;width:100%;margin-top:0;margin-bottom:30px;position:relative;z-index:100;">
    <div style="width:970px;height:90px;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2366308143645027"
           data-ad-slot="5691649682"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
  </script>
</body>
</html>
