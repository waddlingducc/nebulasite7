<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16934078239"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-16934078239');
  </script>

  <!-- AdSense -->
  <script async crossorigin="anonymous"
          src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2366308143645027"></script>

  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moto X3M 2</title>
  <link href="/main.css" rel="stylesheet"/>
  <link href="https://site-assets.fontawesome.com/releases/v6.2.0/css/all.css" rel="stylesheet"/>

  <style>
    :root{
      --rail-down: 20px;    /* was 40px → ads slightly higher */
      --rail-gap: 8px;
      --game-w: 900px;      /* restored original size */
      --game-h: 540px;
      --nav-h: 7vw;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: black url(/images/background.png) center/cover no-repeat fixed;
      font-family: 'Montserrat', system-ui, Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: left;
      padding: 0 1%;
      color: #fff;
      backdrop-filter: blur(10px) saturate(200%) brightness(70%);
      z-index: 5;
    }

    nav img {
      width: 95px; height: auto; margin-right: 1%;
      border-radius: 1vw; user-select: none; cursor: pointer;
      box-shadow: 5px 5px 10px rgba(53,53,53,.46);
    }
    nav h3 { font-size: 4vw; font-weight: 800; margin: 0; }

    .nav-spacer {
      height: 300px;
      width: 100%;
    }

    .stage {
      display: grid;
      grid-template-columns: 160px var(--game-w) 160px;
      justify-content: center;
      align-items: start;
      column-gap: var(--rail-gap);
      width: 100%;
      position: relative;
    }

    .rail {
      margin-top: var(--rail-down);
      z-index: 100;
      position: relative;
    }

    .rail.sticky {
      position: sticky;
      top: calc(var(--nav-h) + 20px);
    }

    .game-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 1;
    }

    .game-title {
      color: #fff; font-weight: 800;
      font-size: clamp(28px, 3.2vw, 48px);
      line-height: 1.1; text-align: center;
      background: rgba(0,0,0,.6);
      padding: 10px 20px; border-radius: 12px; display: inline-block;
    }

    .game-frame-wrapper {
      position: relative;
      width: var(--game-w);
      height: var(--game-h);
    }

    .game-frame { width: 100%; height: 100%; border: none; }

    .game-actions {
      position: absolute; top: 8px; right: 8px; z-index: 200; display: flex;
    }
    .pill-btn {
      text-decoration: none; color: #fff;
      background: #000; padding: 8px 16px; border-radius: 8px; display: inline-block;
    }
    .pill-btn h3 { margin: 0; font-size: 22px; line-height: 1; }

    .bottom-bar {
      display: flex; justify-content: center; width: 100%;
      margin-top: 0px;
      margin-bottom: 30px;
      position: relative;
      z-index: 100;
    }
    .bottom-ad { width: 970px; height: 90px; }
  </style>

</head>
<body>


  <nav>
    <a href="/"><img alt="logo" src="/images/logo.png"/></a>
    <h3>www.NebulaPlay.Site</h3>
  </nav>

  <div class="nav-spacer"></div>

  <main class="stage">
    <!-- LEFT rail -->
    <aside class="rail sticky">
      <ins class="adsbygoogle"
           style="display:inline-block;width:160px;height:600px"
           data-ad-client="ca-pub-2366308143645027"
           data-ad-slot="9891545305"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>

    <!-- GAME -->
    <section class="game-col">
      <div class="game-title">Moto X3M 2</div>
      <div class="game-frame-wrapper">
        <div class="game-actions">
          <a href="/-/12/" class="pill-btn"><h3>Fullscreen</h3></a>
        </div>
        <iframe class="game-frame"
                sandbox="allow-scripts allow-same-origin"
                src="/storage/Moto X3M 2.html">
          <p>Your browser does not support iframes.</p>
        </iframe>
      </div>
    </section>

    <!-- RIGHT rail -->
    <aside class="rail sticky">
      <ins class="adsbygoogle"
           style="display:inline-block;width:160px;height:600px"
           data-ad-client="ca-pub-2366308143645027"
           data-ad-slot="9891545305"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>
  </main>

  <!-- Bottom ad -->
  <div class="bottom-bar">
    <div class="bottom-ad">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2366308143645027"
           data-ad-slot="5691649682"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
  </script>

</body>
</html>
