        let inserted = 0;

                const adClone = adTemplate.cloneNode(true);
                gamesContainer.insertBefore(adClone, gameElements[i + 1 + inserted]);
                (adsbygoogle = window.adsbygoogle || []).push({});
                inserted++;
            }
        }
    });
